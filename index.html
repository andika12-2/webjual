<!DOCTYPE html>
<html>
<head>
  <title>Marketplace Akun Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      background: linear-gradient(90deg, #00ffcc, #ff00ff);
      padding: 20px 0;
      margin: 0;
      text-shadow: 2px 2px #000;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .card {
      background: linear-gradient(145deg, #1e1e1e, #333);
      margin: 15px;
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 0 15px #00ffcc;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px #ff00ff;
    }
    h2 {
      margin-top: 0;
    }
    button {
      background: #00ffcc;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #00ccaa;
    }
  </style>
</head>
<body>

<h1>🔥 MARKETPLACE AKUN GAME 🔥</h1>

<div class="container">

  <div class="card">
    <h2>Mobile Legends</h2>
    <p>Rank Mythic</p>
    <p>Harga: Rp 250.000</p>
    <button onclick="window.open('https://wa.me/6285773293327?text=Halo%20Saya%20mau%20beli%20Mobile%20Legends','_blank')">Beli Sekarang</button>
  </div>

  <div class="card">
    <h2>Free Fire</h2>
    <p>Level 70 + Banyak Skin</p>
    <p>Harga: Rp 150.000</p>
    <button onclick="window.open('https://wa.me/6285773293327?text=Halo%20Saya%20mau%20beli%20Free%20Fire','_blank')">Beli Sekarang</button>
  </div>

  <div class="card">
    <h2>PUBG Mobile</h2>
    <p>Conqueror + Skin Rare</p>
    <p>Harga: Rp 300.000</p>
    <button onclick="window.open('https://wa.me/6285773293327?text=Halo%20Saya%20mau%20beli%20PUBG','_blank')">Beli Sekarang</button>
  </div>

</div>

</body>
</html>
