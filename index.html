<!DOCTYPE html>
<html>
<head>
  <title>Marketplace Akun Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      background: linear-gradient(90deg, #00ffcc, #ff00ff);
      padding: 20px 0;
      margin: 0;
      text-shadow: 2px 2px #000;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .card {
      background: linear-gradient(145deg, #1e1e1e, #333);
      margin: 15px;
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 0 15px #00ffcc;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px #ff00ff;
    }
    h2 {
      margin-top: 0;
    }
    button {
      background: #00ffcc;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #00ccaa;
    }
  </style>
</head>
<body>

<h1>🔥 MARKETPLACE AKUN GAME 🔥</h1>

<div class="container" id="cardsContainer">
</div>

<script>
  const akunGame = [
    {nama:"Mobile Legends", rank:"Mythic", harga:"Rp 250.000"},
    {nama:"Free Fire", rank:"Level 70 + Banyak Skin", harga:"Rp 150.000"},
    {nama:"PUBG Mobile", rank:"Conqueror + Skin Rare", harga:"Rp 300.000"},
    {nama:"Call of Duty Mobile", rank:"Master", harga:"Rp 200.000"},
    {nama:"Genshin Impact", rank:"Level 50", harga:"Rp 180.000"}
  ];

  const nomorWA = "6285773293327";

  const container = document.getElementById("cardsContainer");

  akunGame.forEach(akun => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h2>${akun.Roblox}</h2>
      <p>${akun.Banyak map}</p>
      <p>Harga: ${akun.Rp 10.000}</p>
      <button onclick="window.open('https://wa.me/${nomorWA}?text=Halo%20Saya%20mau%20beli%20${encodeURIComponent(akun.nama)}','_blank')">Beli Sekarang</button>
    `;
    container.appendChild(card);
  });
</script>

</div>

</body>
</html>
